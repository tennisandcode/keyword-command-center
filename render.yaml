# Render Blueprint for the Keyword Command Center portal (Next.js + Postgres).
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# The Apify *actor* is NOT deployed here — it runs on Apify.
services:
  - type: web
    name: keyword-command-center
    runtime: node
    rootDir: portal
    plan: free
    autoDeploy: true
    buildCommand: npm install && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kcc-db
          property: connectionString
      # PORTAL_API_TOKEN and NEXT_PUBLIC_PORTAL_API_TOKEN must be the SAME value.
      - key: PORTAL_API_TOKEN
        sync: false
      - key: NEXT_PUBLIC_PORTAL_API_TOKEN
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: APIFY_ACTOR_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: DIGEST_EMAIL
        sync: false

databases:
  - name: kcc-db
    plan: free
